name: Update land route weather v3

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh forecast
        run: python scripts/update_land_route_weather_v3.py

      - name: Commit updated forecast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add land-route-weather-v3.html data/processed/land_route_weather_forecast_v3.json
          if git diff --cached --quiet; then
            echo "No weather changes to commit"
          else
            git commit -m "Update land route weather v3"
            git push
          fi
