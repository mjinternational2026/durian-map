name: Update land route weather v2

on:
  schedule:
    - cron: "25 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh route weather forecast
        run: python scripts/update_land_route_weather_v2.py

      - name: Commit updated forecast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "land-route-weather-v2.html" "data/processed/land_route_weather_forecast_v2.json"
          git diff --cached --quiet || git commit -m "Update land route weather v2 forecast"
          git push
