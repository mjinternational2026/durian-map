<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>泰国到中国陆运线路天气互动地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root{
      --bg:#f6f8fb;
      --panel:#ffffff;
      --ink:#111827;
      --muted:#64748b;
      --line:#dbe3ee;
      --low:#1f9d55;
      --mid:#d97706;
      --high:#dc2626;
      --blue:#2563eb;
      --teal:#0f766e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;
    }
    header{
      padding:18px 22px 14px;
      border-bottom:1px solid var(--line);
      background:#fff;
    }
    h1{margin:0;font-size:24px;line-height:1.25}
    .sub{margin:6px 0 0;color:var(--muted);font-size:14px}
    .app{
      display:grid;
      grid-template-columns:minmax(0,1fr) 390px;
      gap:14px;
      padding:14px;
      height:calc(100vh - 82px);
      min-height:680px;
    }
    #map{
      width:100%;
      min-height:560px;
      border:1px solid var(--line);
      border-radius:8px;
      overflow:hidden;
      background:#dbeafe;
    }
    aside{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:0;
      overflow:auto;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      padding:14px;
    }
    .panel h2{
      margin:0 0 10px;
      font-size:16px;
      line-height:1.35;
    }
    .control-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0}
    .date-label{font-weight:700;font-size:18px}
    input[type="range"]{width:100%;accent-color:#2563eb}
    input[type="datetime-local"],select{
      width:100%;
      border:1px solid var(--line);
      border-radius:8px;
      padding:9px 10px;
      background:#fff;
      color:var(--ink);
      font:inherit;
      min-height:40px;
    }
    .field{display:grid;gap:6px;margin:10px 0}
    .field span{font-size:13px;color:var(--muted)}
    .toggles{display:grid;grid-template-columns:1fr;gap:8px}
    label.toggle{
      display:flex;
      align-items:center;
      gap:9px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:10px;
      cursor:pointer;
      background:#fbfdff;
    }
    label.toggle span{font-size:13px;color:var(--muted)}
    input[type="checkbox"]{width:18px;height:18px;accent-color:#2563eb}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .metric{
      border:1px solid var(--line);
      border-radius:8px;
      padding:10px;
      min-width:0;
    }
    .metric span{display:block;color:var(--muted);font-size:12px}
    .metric b{display:block;margin-top:4px;font-size:19px}
    .legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      background:#fff;
    }
    .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
    .risk-low{color:var(--low)}
    .risk-mid{color:var(--mid)}
    .risk-high{color:var(--high)}
    .risk-list{display:grid;gap:8px}
    .node{
      border:1px solid var(--line);
      border-radius:8px;
      padding:10px;
      background:#fff;
    }
    .node-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .node-name{font-weight:700;line-height:1.35}
    .badge{
      flex:0 0 auto;
      border-radius:999px;
      padding:3px 8px;
      font-size:12px;
      color:#fff;
      white-space:nowrap;
    }
    .badge.low{background:var(--low)}
    .badge.mid{background:var(--mid)}
    .badge.high{background:var(--high)}
    .node-meta{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.55}
    .eta-list{display:grid;gap:8px}
    .eta-card{
      border:1px solid var(--line);
      border-radius:8px;
      padding:10px;
      background:#fff;
    }
    .eta-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;font-weight:700}
    .eta-route{white-space:nowrap}
    .eta-time{margin-top:8px;font-size:18px;font-weight:700;line-height:1.35}
    .eta-meta{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.6}
    .advice{
      margin:0;
      padding-left:18px;
      color:#334155;
      line-height:1.7;
      font-size:14px;
    }
    .leaflet-popup-content{font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;min-width:360px}
    .popup-title{font-weight:700;font-size:15px;margin-bottom:6px}
    .popup-line{font-size:13px;line-height:1.55;color:#334155}
    .forecast-table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
      font-size:12px;
    }
    .forecast-table th,
    .forecast-table td{
      border-bottom:1px solid #e5e7eb;
      padding:5px 4px;
      text-align:left;
      white-space:nowrap;
    }
    .forecast-table th{color:#64748b;font-weight:700;background:#f8fafc}
    .forecast-table tr.active{background:#eff6ff}
    .forecast-risk{
      display:inline-block;
      min-width:18px;
      border-radius:999px;
      padding:2px 6px;
      color:#fff;
      font-size:11px;
      text-align:center;
    }
    .route-label{
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 8px;
      font-weight:700;
      color:#111827;
      box-shadow:0 4px 14px rgba(15,23,42,.12);
    }
    .source{font-size:12px;color:var(--muted);line-height:1.6}
    @media (max-width: 980px){
      .app{grid-template-columns:1fr;height:auto;min-height:0}
      aside{overflow:visible}
      #map{height:62vh;min-height:430px}
    }
    @media (max-width: 560px){
      header{padding:14px}
      h1{font-size:20px}
      .app{padding:10px}
      .metrics{grid-template-columns:1fr}
      #map{height:58vh;min-height:360px}
    }
  </style>
</head>

  </main>

        osrmHours: 28.7,
        nodes: ["langsuan","bangkok","korat","savannakhet","hanoi","pingxiang","nanning"],
        labelPoint: [16.70, 104.45],
        roadPoints: [
          [9.950179,99.080013],[10.586045,99.113688],[11.756946,99.766904],[12.0614,99.859025],

          [21.030052,105.850078],[21.621864,106.560051],[21.862939,106.519366],[21.881011,106.655123],
          [22.099771,106.74965],[22.153418,107.016812],[22.519527,107.669079],[22.629659,108.180718],
          [22.819835,108.319645]

      },
      r12: {
        name: "R12 线",

        distanceKm: 2293,
        osrmHours: 29.6,
        nodes: ["langsuan","bangkok","korat","nakhonphanom","thakhek","naphao","hanoi","pingxiang","nanning"],
        labelPoint: [17.75, 105.00],
        roadPoints: [
          [9.950179,99.080013],[10.586045,99.113688],[11.756946,99.766904],[12.0614,99.859025],
          [13.075854,99.948111],[13.166398,99.841662],[13.339695,99.828926],[13.59373,100.360992],
          [13.74994,100.49999],[13.954379,100.620492],[14.178579,100.619],[14.280583,100.81237],
          [14.520093,100.915071],[14.637013,101.116383],[14.670596,101.45183],[14.850431,101.571683],
          [14.969843,102.100008],[15.256521,102.414569],[16.041741,102.714281],[16.044911,103.123862],
          [16.184844,103.302538],[16.405882,103.381711],[16.507804,104.332731],[16.617255,104.462638],
          [16.579967,104.611756],[17.390322,104.779745],[17.480637,104.716453],[17.410276,104.829773],
          [17.439715,105.139867],[17.573308,105.22441],[17.491013,105.408076],[17.587767,105.465486],
          [17.56708,105.716509],[17.700455,105.764945],[18.026883,105.861597],[18.234007,105.650079],
          [18.339193,105.755506],[19.052325,105.559538],[19.287837,105.697984],[19.831047,105.695964],
          [20.145746,105.837877],[20.265513,106.02161],[21.030052,105.850078],[21.621864,106.560051],
          [21.862939,106.519366],[21.881011,106.655123],[22.099771,106.74965],[22.153418,107.016812],
          [22.519527,107.669079],[22.629659,108.180718],[22.819835,108.319645]
        ]
      }
    };
    const map = L.map("map", { scrollWheelZoom:true }).setView([17.4,103.2], 5);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 10,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);
    const nodeById = Object.fromEntries(nodes.map(node => [node.id, node]));
    const markers = new Map();
    const routeLines = new Map();
    const routeLabels = new Map();
    const dateRange = document.getElementById("dateRange");
    const dateLabel = document.getElementById("dateLabel");
    const routeYunnan = document.getElementById("routeYunnan");
    const routeR9 = document.getElementById("routeR9");
    const routeR12 = document.getElementById("routeR12");
    const riskList = document.getElementById("riskList");
    const maxRisk = document.getElementById("maxRisk");
    const maxRain = document.getElementById("maxRain");
    const highCount = document.getElementById("highCount");
    const adviceList = document.getElementById("adviceList");
    const departTime = document.getElementById("departTime");
    const drivePlan = document.getElementById("drivePlan");
    const borderMode = document.getElementById("borderMode");
    const inspectionMode = document.getElementById("inspectionMode");
    const etaList = document.getElementById("etaList");
    const forecastUpdatedAtLabel = document.getElementById("forecastUpdatedAt");

    function activeRoutes(){
      const active = [];
      if(routeYunnan.checked) active.push("yunnan");
      if(routeR9.checked) active.push("r9");
      if(routeR12.checked) active.push("r12");
      return active;
    }
    function visibleNodes(){
      const active = activeRoutes();
      return nodes.filter(node => node.routes.some(route => active.includes(route)));
    }
    function nodeRisk(node, day){
      const rain = node.rain[day];
      const pop = node.pop[day];
      let score = node.base;
      if(rain >= 30) score += 3;
      else if(rain >= 15) score += 2;
      else if(rain >= 6) score += 1;
      if(pop >= 90) score += 1;
      if(score >= 4) return "high";
      if(score >= 2) return "mid";
      return "low";
    }
    function riskMarker(node, day){
      const risk = nodeRisk(node, day);
      const rain = node.rain[day];
      return L.divIcon({
        className: "",
        html: `<div style="width:${risk === "high" ? 24 : 20}px;height:${risk === "high" ? 24 : 20}px;border-radius:50%;background:${riskColor[risk]};border:3px solid #fff;box-shadow:0 3px 12px rgba(15,23,42,.35);display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700">${Math.round(rain)}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
    }
    function popupHtml(node, day){
      const risk = nodeRisk(node, day);
      const rows = dates.map((date, index) => {
        const dailyRisk = nodeRisk(node, index);
        const mmdd = date.slice(5);
        return `
          <tr class="${index === day ? "active" : ""}">
            <td>${mmdd}</td>
            <td><span class="forecast-risk" style="background:${riskColor[dailyRisk]}">${riskText[dailyRisk]}</span></td>
            <td>${node.rain[index].toFixed(1)}mm</td>
            <td>${node.pop[index]}%</td>
            <td>${node.tempMin[index].toFixed(0)}-${node.tempMax[index].toFixed(0)}C</td>
          </tr>
        `;
      }).join("");
      return `
        <div class="popup-title">${node.name}</div>
        <div class="popup-line">当前选中日风险：<b style="color:${riskColor[risk]}">${riskText[risk]}</b></div>
        <div class="popup-line">降雨：${node.rain[day].toFixed(1)} mm，降雨概率：${node.pop[day]}%</div>
        <div class="popup-line">温度：${node.tempMin[day].toFixed(1)}-${node.tempMax[day].toFixed(1)} C</div>
        <div class="popup-line">敏感点：${node.sensitive}</div>
        <table class="forecast-table">
          <thead><tr><th>日期</th><th>风险</th><th>雨量</th><th>概率</th><th>温度</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }
    function updateRoutes(day){
      for(const [key, route] of Object.entries(routes)){
        const show = activeRoutes().includes(key);
        const points = route.roadPoints || route.nodes.map(id => [nodeById[id].lat, nodeById[id].lng]);
        if(!routeLines.has(key)){
          routeLines.set(key, L.polyline(points, {
            color: route.color,
            weight: 6,
            opacity: .86,
            lineJoin: "round"
          }).addTo(map));
          const middle = route.labelPoint || points[Math.floor(points.length / 2)];
          routeLabels.set(key, L.marker(middle, {
            icon: L.divIcon({ className:"", html:`<div class="route-label">${route.name}</div>`, iconSize:[88,28], iconAnchor:[44,14] }),
            interactive: false
          }).addTo(map));
        }
        const line = routeLines.get(key);
        const label = routeLabels.get(key);
        if(show){
          line.addTo(map);
          label.addTo(map);
        }else{
          map.removeLayer(line);
          map.removeLayer(label);
        }
      }
    }
    function updateMarkers(day){
      const visible = new Set(visibleNodes().map(node => node.id));
      nodes.forEach(node => {
        if(!markers.has(node.id)){
          const marker = L.marker([node.lat, node.lng], { icon:riskMarker(node, day) }).addTo(map);
          markers.set(node.id, marker);
        }
        const marker = markers.get(node.id);
        marker.setIcon(riskMarker(node, day));
        marker.bindPopup(popupHtml(node, day));
        if(visible.has(node.id)){
          marker.addTo(map);
        }else{
          map.removeLayer(marker);
        }
      });
    }
    function updatePanels(day){
      const list = visibleNodes().map(node => ({
        node,
        risk: nodeRisk(node, day),
        rain: node.rain[day],
        pop: node.pop[day]
      })).sort((a,b) => riskRank[b.risk] - riskRank[a.risk] || b.rain - a.rain);
      const topRisk = list[0]?.risk || "low";
      const topRain = list.reduce((max, item) => Math.max(max, item.rain), 0);
      const high = list.filter(item => item.risk === "high").length;
      maxRisk.textContent = riskText[topRisk];
      maxRisk.className = topRisk === "high" ? "risk-high" : topRisk === "mid" ? "risk-mid" : "risk-low";
      maxRain.textContent = `${topRain.toFixed(1)}mm`;
      highCount.textContent = `${high}个`;
      riskList.innerHTML = list.map(({node, risk, rain, pop}) => `
        <div class="node">
          <div class="node-top">
            <div class="node-name">${node.name}</div>
            <span class="badge ${risk}">${riskText[risk]}风险</span>
          </div>
          <div class="node-meta">降雨 ${rain.toFixed(1)}mm｜概率 ${pop}%｜${node.sensitive}</div>
        </div>
      `).join("");
      const highNames = list.filter(item => item.risk === "high").map(item => item.node.name);
      const advices = [];
      if(highNames.length){
        advices.push(`当天重点避让或预留时间：${highNames.join("、")}。`);
      }else{
        advices.push("当天没有高风险节点，但口岸和山路仍要按阵雨预案执行。");
      }
      if(list.some(item => item.node.id === "luangprabang" && item.risk === "high") || list.some(item => item.node.id === "mengla" && item.risk === "high")){
        advices.push("云南线老挝北部到磨憨/勐腊段建议增加 0.5-1.5 天游动时间。");
      }
      if(list.some(item => ["savannakhet","nakhonphanom","thakhek","naphao","nanning"].includes(item.node.id) && item.risk === "high")){
        advices.push("R9/R12 或南宁段雨量偏大，建议避开夜间强降雨窗口。");
      }
      advices.push("冷链车出发前复查制冷机组、排水、油量和温控记录设备。");
      adviceList.innerHTML = advices.map(text => `<li>${text}</li>`).join("");
    }
    function routeRiskStats(route, day){
      const routeNodes = route.nodes.map(id => nodeById[id]);
      return routeNodes.reduce((stats, node) => {
        const risk = nodeRisk(node, day);
        stats.maxRain = Math.max(stats.maxRain, node.rain[day]);
        stats.high += risk === "high" ? 1 : 0;
        stats.mid += risk === "mid" ? 1 : 0;
        return stats;
      }, { high:0, mid:0, maxRain:0 });
    }
    function weatherBufferHours(stats){
      return stats.high * 7 + stats.mid * 2 + (stats.maxRain >= 40 ? 5 : 0);
    }
    function formatEta(date){
      return new Intl.DateTimeFormat("zh-CN", {
        month:"2-digit",
        day:"2-digit",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      }).format(date);
    }
    function updateEta(day){
      const depart = new Date(departTime.value || "2026-07-20T08:00");
      const factor = Number(drivePlan.value);
      const portDays = Number(borderMode.value);
      const inspectionDays = Number(inspectionMode.value);
      const portHours = portDays * 24;
      const inspectionHours = inspectionDays * 24;
      etaList.innerHTML = activeRoutes().map(key => {
        const route = routes[key];
        const stats = routeRiskStats(route, day);
        const driving = route.osrmHours * factor;
        const weather = weatherBufferHours(stats);
        const minHours = driving + portHours + inspectionHours + Math.max(0, weather - 6);
        const maxHours = driving + portHours + inspectionHours + weather + 8;
        const earliest = new Date(depart.getTime() + minHours * 3600000);
        const latest = new Date(depart.getTime() + maxHours * 3600000);
        const minDays = minHours / 24;
        const maxDays = maxHours / 24;
        const highText = stats.high ? `${stats.high}个高风险节点` : "无高风险节点";
        return `
          <div class="eta-card">
            <div class="eta-title">
              <span>${route.name}</span>
              <span class="eta-route">${route.distanceKm}km</span>
            </div>
            <div class="eta-time">总时长预测：约 ${minDays.toFixed(1)}-${maxDays.toFixed(1)} 天</div>
            <div class="eta-meta">发车 ${formatEta(depart)}｜到岸 ${formatEta(earliest)} - ${formatEta(latest)}</div>
            <div class="eta-meta">驾驶约 ${driving.toFixed(1)}h｜口岸排队 ${portDays}天｜查验 ${inspectionDays}天｜天气缓冲 ${weather}h｜${highText}</div>
          </div>
        `;
      }).join("");
    }
    function fitActiveBounds(){
      const points = visibleNodes().map(node => [node.lat, node.lng]);
      if(points.length) map.fitBounds(points, { padding:[32,32], maxZoom:6 });
    }
    function updateAll(shouldFit = false){
      const day = Number(dateRange.value);
      dateLabel.textContent = dates[day];
      forecastUpdatedAtLabel.textContent = forecastUpdatedAt.replace("T", " ").slice(0, 16);
      updateRoutes(day);
      updateMarkers(day);
      updatePanels(day);
      updateEta(day);
      if(shouldFit) fitActiveBounds();
    }
    dateRange.addEventListener("input", () => updateAll(false));
    routeYunnan.addEventListener("change", () => updateAll(true));
    routeR9.addEventListener("change", () => updateAll(true));
    routeR12.addEventListener("change", () => updateAll(true));
    departTime.addEventListener("input", () => updateAll(false));
    drivePlan.addEventListener("change", () => updateAll(false));
    borderMode.addEventListener("change", () => updateAll(false));
    inspectionMode.addEventListener("change", () => updateAll(false));
    updateAll(true);
  </script>
